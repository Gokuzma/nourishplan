<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NourishPlan — Family Nutrition Together</title>
    <meta name="description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nourishplan.gregok.ca/" />
    <meta property="og:title" content="NourishPlan — Family Nutrition Together" />
    <meta property="og:description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />
    <meta property="og:image" content="https://nourishplan.gregok.ca/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NourishPlan — Family Nutrition Together" />
    <meta name="twitter:description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />
    <meta name="twitter:image" content="https://nourishplan.gregok.ca/og-image.png" />

    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #A8C5A0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-title {
        color: #ffffff;
        font-size: 2rem;
        font-weight: 700;
        font-family: sans-serif;
        margin: 0;
      }
      #splash-subtitle {
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.9rem;
        font-family: sans-serif;
        margin: 0.5rem 0 0;
      }
    </style>

    <script>
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', stored === 'dark' || (!stored && prefersDark));
    </script>
  </head>
  <body>
    <div id="splash">
      <p id="splash-title">NourishPlan</p>
      <p id="splash-subtitle">Family nutrition, together</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
