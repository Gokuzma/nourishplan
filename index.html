<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NourishPlan — Family Nutrition Together</title>
    <meta name="description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nourishplan.gregok.ca/" />
    <meta property="og:title" content="NourishPlan — Family Nutrition Together" />
    <meta property="og:description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />
    <meta property="og:image" content="https://nourishplan.gregok.ca/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NourishPlan — Family Nutrition Together" />
    <meta name="twitter:description" content="Share one meal plan while each person gets personalized portion suggestions. A family nutrition app built for real life." />
    <meta name="twitter:image" content="https://nourishplan.gregok.ca/og-image.png" />

    <!-- NourishPlan v2.0 Gazette edition typography trio -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300..600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0f3b3a;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-title {
        color: #fff5e1;
        font-size: 2.75rem;
        font-weight: 400;
        font-style: italic;
        font-family: "Fraunces", Georgia, serif;
        letter-spacing: -0.03em;
        margin: 0;
      }
      #splash-title .dot {
        color: #f04e2b;
        font-style: normal;
      }
      #splash-subtitle {
        color: rgba(249, 214, 107, 0.9);
        font-size: 0.7rem;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0.75rem 0 0;
      }
    </style>

    <script>
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', stored === 'dark' || (!stored && prefersDark));
    </script>
  </head>
  <body>
    <div id="splash">
      <p id="splash-title">Nourish<span class="dot">·</span>plan</p>
      <p id="splash-subtitle">The Sunday Supper Gazette</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
